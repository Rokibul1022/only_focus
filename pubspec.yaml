name: only_focus
description: A distraction-free, high-signal information app for purposeful reading
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  cloud_functions: ^5.0.4
  # firebase_messaging: ^15.0.4  # Temporarily disabled - causing iOS build issues
  firebase_analytics: ^11.2.1
  
  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  
  # Local storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  
  # Networking
  dio: ^5.9.2
  dart_rss: ^3.0.0
  flutter_cache_manager: ^3.3.2
  connectivity_plus: ^6.0.3
  http: ^1.2.1
  
  # Content parsing
  html: ^0.15.4
  webview_flutter: ^4.7.0
  flutter_markdown: ^0.7.3
  
  # Focus & UX
  flutter_tts: ^4.0.2
  audioplayers: ^6.0.0
  flutter_local_notifications: ^17.1.2
  screenshot: ^3.0.0
  
  # UI & utilities
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  google_sign_in: ^6.2.1
  image_picker: ^1.0.7
  # google_mlkit_text_recognition: ^0.14.0  # Disabled - using OCR.space API instead

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
    - assets/js/
